<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>For Belle 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

<style>



*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --lavender-dark:#6b5b95;
  --lavender-mid:#9b8bbf;
  --lavender-light:#c9b8d4;
  --lavender-glow:#d4c8e0;
  --cream:#fdfbf7;
  --sage:#6b8e6f;
  --text-dark:#3d3349;
  --text-soft:#6b5b95;
}

body{
  background:linear-gradient(
    180deg,
    var(--cream) 0%,
    #ede8f5 50%,
    #e8dff5 100%
  );

  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:var(--text-dark);
  position:relative;
  font-family:'Quicksand',sans-serif;
}

/* Background texture */
body::before{
  content:'';
  position:fixed;
  inset:0;

  background-image:
    radial-gradient(circle at 20% 30%, rgba(155,139,191,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(168,181,160,0.06) 0%, transparent 50%);

  pointer-events:none;
  z-index:0;
}

/* RANDOM PETALS */
.petals{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:1;
}

.bg-petal{
  position:absolute;
  top:-80px;
  opacity:0.8;

  will-change:transform;

  animation-name:fallPetal;
  animation-timing-function:linear;
  animation-fill-mode:forwards;

  filter:
    blur(0.2px)
    drop-shadow(0 0 8px rgba(201,184,212,0.45));
}

@keyframes fallPetal{

  0%{
    transform:
      translate3d(0,-80px,0)
      rotate(0deg);

    opacity:0;
  }

  10%{
    opacity:0.9;
  }

  50%{
    transform:
      translate3d(var(--drift),50vh,0)
      rotate(180deg);
  }

  100%{
    transform:
      translate3d(calc(var(--drift) * 1.8),110vh,0)
      rotate(360deg);

    opacity:0;
  }
}

/* MAIN CONTAINER */
.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:40px 20px;
  max-width:900px;

  animation:fade-in 1.5s ease-out;
}

@keyframes fade-in{
  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.hint{
  font-size:1.1rem;
  color:var(--text-soft);
  margin-bottom:40px;

  opacity:0;
  animation:fade-in 2s ease-out 0.5s forwards;
}

.hint.hidden{
  display:none;
}

/* FLOWER */
.flower-container{
  position:relative;
  display:inline-block;
}

.interactive-flower{
  width:500px;
  height:600px;

  filter:drop-shadow(0 15px 40px rgba(107,91,149,0.2));

  animation:gentle-sway 4s ease-in-out infinite;
}

@keyframes gentle-sway{
  0%,100%{
    transform:rotate(-0.5deg);
  }

  50%{
    transform:rotate(0.5deg);
  }
}

.petal-group{
  cursor:pointer;
  transition:all 0.3s ease;
}

.petal-group:hover{
  filter:brightness(1.2);
}

.petal-group.clicked{
  opacity:0.95;

  filter:
    brightness(1.3)
    drop-shadow(0 0 8px var(--lavender-glow));
}

/* MESSAGE */
.message-reveal{
  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);

  padding:45px 70px;

  border-radius:30px;

  box-shadow:0 20px 60px rgba(107,91,149,0.3);

  border:2px solid var(--lavender-light);

  opacity:0;
  pointer-events:none;

  transition:all 0.8s cubic-bezier(0.4,0,0.2,1);

  max-width:750px;
  width:90%;

  z-index:10;
}

.message-reveal.show{
  opacity:1;
  pointer-events:all;

  transform:translate(-50%,-50%) scale(1);
}

.message-reveal h2{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;
  color:var(--lavender-dark);
  line-height:1.5;
  font-weight:400;
}

/* SPARKLES */
.sparkles{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.sparkle{
  position:absolute;

  width:10px;
  height:10px;

  background:var(--lavender-light);

  border-radius:50%;

  animation:sparkle-float 2s ease-out forwards;
}

@keyframes sparkle-float{

  0%{
    transform:translate(0,0) scale(0);
    opacity:1;
  }

  100%{
    transform:translate(var(--tx),var(--ty)) scale(1);
    opacity:0;
  }
}

/* PROGRESS */
.progress{
  margin-top:40px;
  color:var(--text-soft);

  opacity:0;
  animation:fade-in 2s ease-out 1s forwards;
}

.progress.hidden{
  display:none;
}

.progress-bar{
  width:320px;
  height:10px;

  background:rgba(155,139,191,0.2);

  border-radius:20px;

  margin:15px auto 10px;

  overflow:hidden;
}

.progress-fill{
  height:100%;

  background:
    linear-gradient(
      90deg,
      var(--lavender-mid),
      var(--lavender-light)
    );

  width:0%;

  transition:width 0.4s ease;
}

#progressPercent{
  margin-top:8px;
  font-size:0.9rem;
  color:var(--lavender-dark);
}

/* FOOTER */
footer{
  position:fixed;
  bottom:20px;
  left:50%;

  transform:translateX(-50%);

  color:var(--text-soft);
  font-size:0.9rem;

  z-index:2;
}

/* RESPONSIVE */
@media(max-width:768px){

  .interactive-flower{
    width:350px;
    height:420px;
  }

  .message-reveal{
    padding:35px 40px;
  }

  .message-reveal h2{
    font-size:1.6rem;
  }

  .progress-bar{
    width:240px;
  }
}

</style>
</head>

<body>

<div class="petals" id="petals"></div>

<div class="container">

  <p class="hint" id="hint"> Touch each petal to reveal a message 🌸</p>
  <div class="flower-container">

    <svg class="interactive-flower" viewBox="0 0 400 600">

      <!-- Stem -->
      <path d="M200 600 Q200 450, 200 300 Q200 200, 200 180"
      stroke="#7a9176"
      stroke-width="6"
      fill="none"
      stroke-linecap="round"/>

      <!-- Leaves -->
      <ellipse cx="170" cy="450" rx="40" ry="22"
      fill="#a8b5a0"
      transform="rotate(-35 170 450)"/>

      <ellipse cx="230" cy="400" rx="40" ry="22"
      fill="#a8b5a0"
      transform="rotate(35 230 400)"/>

      <!-- PETALS -->

      <g class="petal-group" data-petal="1">
        <ellipse cx="200" cy="120" rx="35" ry="60" fill="#c9b8d4"/>
      </g>

      <g class="petal-group" data-petal="2">
        <ellipse cx="250" cy="160" rx="35" ry="60"
        fill="#c9b8d4"
        transform="rotate(72 250 160)"/>
      </g>

      <g class="petal-group" data-petal="3">
        <ellipse cx="230" cy="220" rx="35" ry="60"
        fill="#c9b8d4"
        transform="rotate(144 230 220)"/>
      </g>

      <g class="petal-group" data-petal="4">
        <ellipse cx="170" cy="220" rx="35" ry="60"
        fill="#c9b8d4"
        transform="rotate(-144 170 220)"/>
      </g>

      <g class="petal-group" data-petal="5">
        <ellipse cx="150" cy="160" rx="35" ry="60"
        fill="#c9b8d4"
        transform="rotate(-72 150 160)"/>
      </g>

      <!-- CENTER -->
      <circle cx="200" cy="180" r="25" fill="#8b7aaf"/>
      <circle cx="200" cy="180" r="18" fill="#9b8bbf"/>

    </svg>

    <div class="sparkles" id="sparkles"></div>

    <div class="message-reveal" id="messageBox">
      <h2>
        This is the least I can do for you, Belle. Even if we’re far apart, I want you to know
        that I’m serious about what i said last night na gusto kita 💜
      </h2>
    </div>

  </div>

  <div class="progress" id="progress">

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <span id="progressText">
      0 of 5 petals
    </span>

    <p id="progressPercent">
      0% completed
    </p>

  </div>

</div>


<script>

const petalsContainer =
document.getElementById('petals');

const petalGroups =
document.querySelectorAll('.petal-group');

const messageBox =
document.getElementById('messageBox');

const progressFill =
document.getElementById('progressFill');

const progressText =
document.getElementById('progressText');

const progressPercent =
document.getElementById('progressPercent');

const sparkles =
document.getElementById('sparkles');

const hint =
document.getElementById('hint');

const progress =
document.getElementById('progress');

let clickedPetals = new Set();
const totalPetals = petalGroups.length;

/* Falling petals */
function createFallingPetal(){

  const petal =
  document.createElementNS(
    "http://www.w3.org/2000/svg",
    "svg"
  );

  const size = Math.random() * 25 + 18;
  const duration = Math.random() * 8 + 10;
  const left = Math.random() * window.innerWidth;
  const drift = (Math.random() - 0.5) * 220;
  const rotate = Math.random() * 360;

  petal.setAttribute("viewBox","0 0 30 30");

  petal.classList.add("bg-petal");

  petal.style.width = `${size}px`;
  petal.style.height = `${size}px`;
  petal.style.left = `${left}px`;

  petal.style.animationDuration =
  `${duration}s`;

  petal.style.setProperty(
    '--drift',
    `${drift}px`
  );

  petal.style.transform =
  `rotate(${rotate}deg)`;

  petal.innerHTML = `
    <ellipse
      cx="15"
      cy="15"
      rx="8"
      ry="15"
      fill="${Math.random() > 0.5 ? '#c9b8d4' : '#9b8bbf'}"
      opacity="0.9"
      transform="rotate(${Math.random()*90} 15 15)"
    />
  `;

  petalsContainer.appendChild(petal);

  setTimeout(()=>{
    petal.remove();
  }, duration * 1000);
}

setInterval(()=>{
  createFallingPetal();
},450);

/* Petal clicks */
petalGroups.forEach(group=>{

  group.addEventListener('click',function(e){

    const petalNum =
    this.getAttribute('data-petal');

    if(!clickedPetals.has(petalNum)){

      clickedPetals.add(petalNum);

      this.classList.add('clicked');

      createSparkle(
        e.clientX,
        e.clientY
      );

      updateProgress();

      if(clickedPetals.size === totalPetals){

        setTimeout(()=>{
          revealMessage();
        },300);
      }
    }
  });
});

/* Progress */
function updateProgress(){

  const percentage =
  Math.round(
    (clickedPetals.size / totalPetals) * 100
  );

  progressFill.style.width =
  percentage + '%';

  progressText.textContent =
  `${clickedPetals.size} of ${totalPetals} petals`;

  progressPercent.textContent =
  `${percentage}% completed`;
}

/* Sparkles */
function createSparkle(x,y){

  const sparkle =
  document.createElement('div');

  sparkle.className = 'sparkle';

  const tx =
  (Math.random()-0.5)*100;

  const ty =
  (Math.random()-0.5)*100;

  sparkle.style.left = x + 'px';
  sparkle.style.top = y + 'px';

  sparkle.style.setProperty(
    '--tx',
    tx + 'px'
  );

  sparkle.style.setProperty(
    '--ty',
    ty + 'px'
  );

  sparkles.appendChild(sparkle);

  setTimeout(()=>{
    sparkle.remove();
  },2000);
}

/* Reveal */
function revealMessage(){

  messageBox.classList.add('show');

  hint.classList.add('hidden');

  progress.classList.add('hidden');

  for(let i=0;i<30;i++){

    setTimeout(()=>{

      const x =
      window.innerWidth/2 +
      (Math.random()-0.5)*300;

      const y =
      window.innerHeight/2 +
      (Math.random()-0.5)*300;

      createSparkle(x,y);

    },i*80);
  }
}

</script>

</body>
</html>
